spring.application.name=api-gateway

server.port=8080

# Eureka Server registry
eureka.client.service-url.defaultZone=http://localhost:8761/registry/eureka


#This enables service discovery routing.
#Meaning:
#API Gateway will read all services from Eureka registry
#It will automatically create routes for them
#You do NOT need to manually define routes
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

#This converts service names to lowercase in URLs.
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true